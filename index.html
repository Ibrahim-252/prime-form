<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRIME FORM — Executive Health Coaching</title>
    <meta name="description" content="Personalized, science-backed health coaching designed for busy professionals and corporate executives." />
    <meta name="theme-color" content="#1a1a1a" />
    <meta property="og:title" content="PRIME FORM — Executive Health Coaching" />
    <meta property="og:description" content="Personalized, science-backed health coaching for busy professionals who want measurable health performance." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo/primelogo.jpeg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PRIME FORM — Executive Health Coaching" />
    <meta name="twitter:description" content="Personalized, science-backed health coaching for busy professionals who want measurable health performance." />
    <meta name="twitter:image" content="/logo/primelogo.jpeg" />
    <link rel="icon" type="image/jpeg" href="/logo/primelogo.jpeg" />

    <!-- Google Fonts: Clash Display (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ─── CSS Custom Properties ─── */
      :root {
        --primary:    #1a1a1a;
        --accent:     #ff6b35;
        --secondary:  #004e89;
        --surface:    #111111;
        --muted:      #888888;
        --light:      #f5f2ee;
        --font-display: 'Bebas Neue', sans-serif;
        --font-body:    'DM Sans', sans-serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        font-family: var(--font-body);
        background: var(--primary);
        color: var(--light);
        -webkit-font-smoothing: antialiased;
      }

      :focus-visible {
        outline: 2px solid rgba(255, 107, 53, 0.7);
        outline-offset: 2px;
      }

      /* Thin scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--primary); }
      ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
